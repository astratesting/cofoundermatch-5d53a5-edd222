version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cofoundermatch
      POSTGRES_USER: cofoundermatch
      POSTGRES_PASSWORD: cofoundermatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cofoundermatch -d cofoundermatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://cofoundermatch:cofoundermatch@postgres:5432/cofoundermatch
      SECRET_KEY: change-me-to-a-long-random-secret
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
